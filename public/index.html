<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 WhatsApp Crash Suite v4.0 — Baileys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 1100px; width: 100%; background: rgba(18,22,30,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(37,211,102,0.12); border-radius: 32px; padding: 32px 40px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #25d366, #128c7e); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; box-shadow: 0 4px 16px rgba(37,211,102,0.3); }
        .header-title { font-size: 22px; font-weight: 700; }
        .header-title span { color: #25d366; }
        .header-badge { margin-left: auto; font-size: 11px; padding: 4px 14px; border-radius: 100px; background: rgba(37,211,102,0.12); color: #25d366; border: 1px solid rgba(37,211,102,0.12); font-weight: 600; text-transform: uppercase; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background: #25d366; box-shadow: 0 0 12px rgba(37,211,102,0.4); }
        .status-dot.offline { background: #e74c3c; box-shadow: 0 0 12px rgba(231,76,60,0.4); }
        .status-dot.connecting { background: #f5a623; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .section { margin-bottom: 24px; background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px 24px; border: 1px solid rgba(255,255,255,0.04); }
        .section-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
        .section-title .badge { font-size: 10px; background: rgba(37,211,102,0.08); color: #25d366; padding: 2px 10px; border-radius: 100px; font-weight: 400; text-transform: none; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .row .input-wrap { flex: 1; min-width: 180px; }
        .row input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; color: #f0f0f0; font-size: 15px; outline: none; }
        .row input:focus { border-color: #25d366; background: rgba(255,255,255,0.07); }
        .row input::placeholder { color: #555; }
        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #25d366, #128c7e); color: #fff; box-shadow: 0 4px 16px rgba(37,211,102,0.2); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; box-shadow: 0 4px 16px rgba(231,76,60,0.2); }
        .btn-danger:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(231,76,60,0.35); }
        .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; color: #ccc; border: 1px solid rgba(255,255,255,0.08); }
        .btn-outline:hover { background: rgba(255,255,255,0.04); color: #fff; }
        .btn-sm { padding: 6px 16px; font-size: 12px; border-radius: 8px; }
        .vectors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 4px; }
        .vector-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative; }
        .vector-card:hover:not(.selected) { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .vector-card.selected { border-color: #25d366; background: rgba(37,211,102,0.06); box-shadow: 0 0 20px rgba(37,211,102,0.04); }
        .vector-card .v-icon { font-size: 20px; display: block; }
        .vector-card .v-name { font-size: 13px; font-weight: 500; color: #e8e8e8; }
        .vector-card .v-desc { font-size: 11px; color: #777; line-height: 1.3; margin-top: 2px; }
        .vector-card .v-badge { position: absolute; top: 8px; right: 10px; font-size: 8px; padding: 1px 8px; border-radius: 100px; font-weight: 600; text-transform: uppercase; }
        .v-badge.danger { background: rgba(231,76,60,0.12); color: #e74c3c; }
        .v-badge.invisible { background: rgba(155,89,182,0.12); color: #9b59b6; }
        .v-badge.group { background: rgba(52,152,219,0.12); color: #3498db; }
        .vector-card .v-check { display: none; position: absolute; bottom: 8px; right: 10px; font-size: 14px; color: #25d366; }
        .vector-card.selected .v-check { display: block; }
        .qr-container { display: flex; justify-content: center; padding: 10px; }
        .qr-container img { max-width: 250px; border-radius: 12px; background: white; padding: 10px; }
        .log-container { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.25); border-radius: 10px; padding: 10px 14px; font-family: monospace; font-size: 12px; line-height: 1.8; border: 1px solid rgba(255,255,255,0.03); }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .log-entry:last-child { border-bottom: none; }
        .log-entry .log-time { color: #444; margin-right: 8px; }
        .log-entry .log-msg { color: #aaa; }
        .log-entry.success .log-msg { color: #25d366; }
        .log-entry.error .log-msg { color: #e74c3c; }
        .log-empty { color: #444; font-style: italic; padding: 8px 0; }
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 420px; }
        .toast { padding: 14px 20px; border-radius: 14px; background: rgba(18,22,30,0.96); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 12px 40px rgba(0,0,0,0.6); font-size: 14px; color: #e0e0e0; animation: slideIn 0.4s; display: flex; align-items: center; gap: 12px; }
        .toast.success { border-left: 3px solid #25d366; }
        .toast.error { border-left: 3px solid #e74c3c; }
        .toast.warning { border-left: 3px solid #f5a623; }
        .toast.info { border-left: 3px solid #3498db; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        .toast .toast-close { cursor: pointer; opacity: 0.4; background: none; border: none; color: #fff; padding: 4px; }
        .toast .toast-close:hover { opacity: 1; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #25d366; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .container { padding: 20px; } .row { flex-direction: column; } .row .input-wrap { min-width: 100%; } .btn { width: 100%; justify-content: center; } .vectors-grid { grid-template-columns: 1fr 1fr; } .toast-container { right: 16px; left: 16px; max-width: 100%; bottom: 16px; } }
        @media (max-width: 480px) { .vectors-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-icon">⚡</div>
        <div class="header-title">Crash<span>Suite</span></div>
        <div class="header-badge">v4.0 · Baileys</div>
        <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
            <span class="status-dot offline" id="statusDot"></span>
            <span id="statusText" style="font-size:13px; color:#666;">Offline</span>
        </div>
    </div>

    <!-- QR Section -->
    <div class="section">
        <div class="section-title">
            📱 WhatsApp Connection
            <span class="badge" id="connectionBadge">Disconnected</span>
        </div>
        <div style="text-align:center; padding:10px;">
            <div id="qrImageDisplay">
                <div style="color:#555; padding:20px;">Loading QR code...</div>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" id="connectBtn">🔄 Connect</button>
            </div>
            <div id="connectionStatus" style="margin-top:10px; font-size:14px; color:#888;"></div>
        </div>
    </div>

    <!-- Target Section -->
    <div class="section">
        <div class="section-title">
            🎯 Target
            <span class="badge" id="targetBadge">Not Set</span>
        </div>
        <div class="row">
            <div class="input-wrap">
                <input type="text" id="targetInput" placeholder="+923001234567 (or group invite link)">
            </div>
            <button class="btn btn-primary" id="setTargetBtn">🎯 Set Target</button>
            <button class="btn btn-outline" id="clearTargetBtn" style="display:none;">✕ Clear</button>
        </div>
        <div id="targetDisplay" style="display:none; margin-top:12px; padding:10px 16px; background:rgba(37,211,102,0.04); border-radius:10px; border:1px solid rgba(37,211,102,0.06);">
            <span style="color:#666;">Target: </span>
            <span id="targetValue" style="color:#f5a623; font-weight:500; font-family:monospace;">—</span>
            <span id="targetTypeBadge" style="margin-left:12px; font-size:10px; background:rgba(52,152,219,0.08); color:#3498db; padding:2px 10px; border-radius:100px; text-transform:uppercase;">individual</span>
        </div>
    </div>

    <!-- Vectors -->
    <div class="section">
        <div class="section-title">
            💀 Crash Vectors
            <span class="badge" id="vectorCount">0 loaded</span>
            <span style="margin-left:auto; font-size:11px; color:#444;">
                <span id="selectedVectorName">None selected</span>
            </span>
        </div>
        <div class="vectors-grid" id="vectorsGrid"></div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-danger" id="executeBtn" disabled style="flex:1; min-width:150px;">
                💀 Execute Crash
            </button>
        </div>
    </div>

    <!-- Logs -->
    <div class="section">
        <div class="section-title">
            📋 Activity Log
            <span class="badge" id="logCount">0</span>
            <button class="btn btn-outline btn-sm" id="clearLogsBtn" style="margin-left:auto;">Clear</button>
        </div>
        <div class="log-container" id="logContainer">
            <div class="log-empty">— No activity yet —</div>
        </div>
    </div>

    <!-- Footer -->
    <div style="margin-top:20px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.03); display:flex; justify-content:space-between; flex-wrap:wrap; font-size:11px; color:#333;">
        <span>🔥 WhatsApp Crash Suite v4.0 — Baileys</span>
        <span>💀 <span id="crashCountDisplay">0</span> crashes</span>
    </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
    const API_BASE = '';

    // ============================================================
    // STATE
    // ============================================================

    const state = {
        connected: false,
        target: null,
        targetType: 'individual',
        selectedVector: null,
        vectors: [],
        logs: [],
        crashCount: 0,
        isExecuting: false
    };

    // ============================================================
    // DOM REFS
    // ============================================================

    const $ = (s) => document.querySelector(s);
    const dom = {
        statusDot: $('#statusDot'),
        statusText: $('#statusText'),
        connectionBadge: $('#connectionBadge'),
        connectBtn: $('#connectBtn'),
        targetInput: $('#targetInput'),
        setTargetBtn: $('#setTargetBtn'),
        clearTargetBtn: $('#clearTargetBtn'),
        targetDisplay: $('#targetDisplay'),
        targetValue: $('#targetValue'),
        targetTypeBadge: $('#targetTypeBadge'),
        targetBadge: $('#targetBadge'),
        vectorsGrid: $('#vectorsGrid'),
        vectorCount: $('#vectorCount'),
        selectedVectorName: $('#selectedVectorName'),
        executeBtn: $('#executeBtn'),
        logContainer: $('#logContainer'),
        logCount: $('#logCount'),
        clearLogsBtn: $('#clearLogsBtn'),
        crashCountDisplay: $('#crashCountDisplay'),
        qrImageDisplay: $('#qrImageDisplay'),
        connectionStatus: $('#connectionStatus')
    };

    // ============================================================
    // TOAST
    // ============================================================

    function showToast(msg, type='info', duration=4000) {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        t.innerHTML = `
            <span>${icons[type]||'ℹ️'}</span>
            <span style="flex:1;">${msg}</span>
            <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
        `;
        c.appendChild(t);
        if (duration > 0) setTimeout(() => t.remove(), duration);
        return t;
    }

    // ============================================================
    // LOGS
    // ============================================================

    function addLog(msg, type='info') {
        const time = new Date().toLocaleTimeString();
        state.logs.unshift({ time, msg, type });
        renderLogs();
    }

    function renderLogs() {
        const c = dom.logContainer;
        dom.logCount.textContent = state.logs.length;
        if (state.logs.length === 0) {
            c.innerHTML = '<div class="log-empty">— No activity yet —</div>';
            return;
        }
        c.innerHTML = state.logs.slice(0, 100).map(e => `
            <div class="log-entry ${e.type}">
                <span class="log-time">[${e.time}]</span>
                <span class="log-msg">${e.msg}</span>
            </div>
        `).join('');
        c.scrollTop = 0;
    }

    // ============================================================
    // API CALLS
    // ============================================================

    async function apiCall(endpoint, method='GET', data=null) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (data) opts.body = JSON.stringify(data);
        const res = await fetch(`${API_BASE}${endpoint}`, opts);
        return await res.json();
    }

    // ============================================================
    // FETCH QR
    // ============================================================

    async function fetchQR() {
        try {
            const r = await apiCall('/api/qr-image');
            if (r.success && r.image) {
                dom.qrImageDisplay.innerHTML = `
                    <img src="${r.image}" style="max-width:250px; border-radius:12px; background:white; padding:10px;">
                    <div style="margin-top:8px; color:#888; font-size:12px;">Scan with WhatsApp → Linked Devices</div>
                `;
            } else if (r.connected) {
                dom.qrImageDisplay.innerHTML = `<div style="color:#25d366; font-size:18px;">✅ Connected!</div>`;
            } else {
                dom.qrImageDisplay.innerHTML = `<div style="color:#555;">No QR available. Click "Connect" to generate.</div>`;
            }
        } catch(e) {
            console.error('QR fetch error:', e);
        }
    }

    // ============================================================
    // LOAD VECTORS
    // ============================================================

    async function loadVectors() {
        try {
            const r = await apiCall('/api/vectors');
            if (r.success) {
                state.vectors = r.vectors || [];
                renderVectors();
                dom.vectorCount.textContent = `${state.vectors.length} loaded`;
                addLog(`📋 Loaded ${state.vectors.length} vectors`, 'info');
            }
        } catch(e) {
            showToast('❌ Error loading vectors', 'error');
        }
    }

    function renderVectors() {
        const g = dom.vectorsGrid;
        if (!state.vectors.length) {
            g.innerHTML = '<div style="text-align:center;padding:20px;color:#444;">No vectors</div>';
            return;
        }
        g.innerHTML = state.vectors.map(v => `
            <div class="vector-card" data-id="${v.id}" data-name="${v.name}">
                <span class="v-badge ${v.badgeClass||'danger'}">${v.badge||'CRASH'}</span>
                <span class="v-icon">${v.icon||'💀'}</span>
                <div class="v-name">${v.name}</div>
                <div class="v-desc">${v.desc||''}</div>
                <span class="v-check">✓</span>
            </div>
        `).join('');
        g.querySelectorAll('.vector-card').forEach(c => {
            c.onclick = () => {
                document.querySelectorAll('.vector-card').forEach(x => x.classList.remove('selected'));
                c.classList.add('selected');
                state.selectedVector = c.dataset.id;
                dom.selectedVectorName.textContent = `Selected: ${c.dataset.name}`;
                dom.executeBtn.disabled = false;
                addLog(`🎯 Selected: ${c.dataset.name}`, 'info');
            };
        });
    }

    // ============================================================
    // STATUS & CONNECT
    // ============================================================

    async function checkStatus() {
        try {
            const r = await apiCall('/api/status');
            if (r.success) {
                state.connected = r.connected;
                updateUI();
                if (r.connected) {
                    dom.connectionStatus.textContent = '✅ Connected!';
                    dom.connectionStatus.style.color = '#25d366';
                } else if (r.qrAvailable) {
                    dom.connectionStatus.textContent = '📱 Scan QR to connect';
                    dom.connectionStatus.style.color = '#f5a623';
                } else {
                    dom.connectionStatus.textContent = '⏳ Connecting...';
                    dom.connectionStatus.style.color = '#888';
                }
            }
        } catch(e) {}
    }

    function updateUI() {
        const dot = dom.statusDot;
        const text = dom.statusText;
        if (state.connected) {
            dot.className = 'status-dot online';
            text.textContent = 'Online';
            dom.connectionBadge.textContent = '✅ Connected';
            dom.connectionBadge.style.color = '#25d366';
            dom.connectBtn.textContent = '✅ Connected';
            dom.connectBtn.disabled = true;
        } else {
            dot.className = 'status-dot offline';
            text.textContent = 'Offline';
            dom.connectionBadge.textContent = 'Disconnected';
            dom.connectionBadge.style.color = '#666';
            dom.connectBtn.textContent = '🔄 Connect';
            dom.connectBtn.disabled = false;
        }
    }

    async function handleConnect() {
        dom.connectBtn.disabled = true;
        dom.connectBtn.innerHTML = '<span class="spinner"></span> Connecting...';
        dom.connectionStatus.textContent = '⏳ Connecting...';
        dom.connectionStatus.style.color = '#f5a623';
        try {
            const r = await apiCall('/api/connect', 'POST');
            if (r.success) {
                addLog('📱 Connecting...', 'info');
                showToast('📱 Connecting... Check QR', 'info', 3000);
                setTimeout(checkStatus, 3000);
            } else {
                showToast('❌ ' + (r.error || 'Failed'), 'error');
            }
        } catch(e) {
            showToast('❌ Error: ' + e.message, 'error');
        } finally {
            dom.connectBtn.innerHTML = '🔄 Connect';
            dom.connectBtn.disabled = false;
        }
    }

    // ============================================================
    // TARGET & CRASH
    // ============================================================

    async function handleSetTarget() {
        const target = dom.targetInput.value.trim();
        if (!target) { showToast('⚠️ Enter target', 'warning'); return; }
        if (!state.connected) { showToast('⚠️ Connect first', 'warning'); return; }
        dom.setTargetBtn.disabled = true;
        dom.setTargetBtn.innerHTML = '<span class="spinner"></span>';
        try {
            state.target = target;
            state.targetType = target.includes('chat.whatsapp.com') ? 'group' : 'individual';
            dom.targetValue.textContent = target;
            dom.targetTypeBadge.textContent = state.targetType;
            dom.targetDisplay.style.display = 'block';
            dom.targetBadge.textContent = `🎯 ${target}`;
            dom.targetBadge.style.color = '#f5a623';
            dom.clearTargetBtn.style.display = 'inline-flex';
            addLog(`🎯 Target set: ${target} (${state.targetType})`, 'success');
            showToast(`🎯 Target set: ${target}`, 'success');
            if (!state.selectedVector && state.vectors.length > 0) {
                const first = document.querySelector('.vector-card');
                if (first) first.click();
            }
        } catch(e) {
            showToast('❌ Error: ' + e.message, 'error');
        } finally {
            dom.setTargetBtn.disabled = false;
            dom.setTargetBtn.innerHTML = '🎯 Set Target';
        }
    }

    function handleClearTarget() {
        state.target = null;
        state.targetType = 'individual';
        dom.targetDisplay.style.display = 'none';
        dom.targetBadge.textContent = 'Not Set';
        dom.targetBadge.style.color = '#666';
        dom.clearTargetBtn.style.display = 'none';
        dom.targetInput.value = '';
        dom.executeBtn.disabled = true;
        dom.selectedVectorName.textContent = 'None selected';
        document.querySelectorAll('.vector-card').forEach(c => c.classList.remove('selected'));
        state.selectedVector = null;
        addLog('✕ Target cleared', 'info');
        showToast('✕ Target cleared', 'info');
    }

    async function handleExecuteCrash() {
        if (!state.connected) { showToast('⚠️ Connect first', 'warning'); return; }
        if (!state.target) { showToast('⚠️ Set target', 'warning'); return; }
        if (!state.selectedVector) { showToast('⚠️ Select vector', 'warning'); return; }
        if (state.isExecuting) return;
        state.isExecuting = true;
        dom.executeBtn.disabled = true;
        dom.executeBtn.innerHTML = '<span class="spinner"></span> Executing...';
        try {
            const r = await apiCall('/api/crash', 'POST', {
                target: state.target,
                vector: state.selectedVector
            });
            if (r.success) {
                state.crashCount++;
                dom.crashCountDisplay.textContent = state.crashCount;
                addLog(`✅💀 ${r.vector} → CRASHED ${r.target}`, 'success');
                showToast(`✅💀 ${r.vector} CRASHED!`, 'success', 5000);
                document.body.style.background = 'rgba(37,211,102,0.03)';
                setTimeout(() => document.body.style.background = '', 300);
            } else {
                addLog(`❌ Crash failed: ${r.error}`, 'error');
                showToast(`❌ Crash failed: ${r.error}`, 'error');
            }
        } catch(e) {
            addLog(`❌ Error: ${e.message}`, 'error');
            showToast(`❌ Error: ${e.message}`, 'error');
        } finally {
            state.isExecuting = false;
            dom.executeBtn.disabled = false;
            dom.executeBtn.innerHTML = '💀 Execute Crash';
        }
    }

    function clearLogs() {
        state.logs = [];
        renderLogs();
        showToast('🧹 Logs cleared', 'info');
    }

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================

    document.addEventListener('keydown', (e) => {
        if (e.target === dom.targetInput && e.key === 'Enter') handleSetTarget();
        if (e.ctrlKey && e.key === 'Enter') handleExecuteCrash();
    });

    // ============================================================
    // INIT
    // ============================================================

    function init() {
        dom.connectBtn.addEventListener('click', handleConnect);
        dom.setTargetBtn.addEventListener('click', handleSetTarget);
        dom.clearTargetBtn.addEventListener('click', handleClearTarget);
        dom.executeBtn.addEventListener('click', handleExecuteCrash);
        dom.clearLogsBtn.addEventListener('click', clearLogs);

        loadVectors();
        checkStatus();
        fetchQR();

        setInterval(fetchQR, 5000);
        setInterval(checkStatus, 5000);

        addLog('🔥 WhatsApp Crash Suite v4.0 loaded (Baileys)', 'info');
        showToast('🔥 Ready! Connect to WhatsApp.', 'info', 4000);
    }

    document.addEventListener('DOMContentLoaded', init);
})();
</script>
